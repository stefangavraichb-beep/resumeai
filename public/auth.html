<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #080809;
      --surface: #0f0f11;
      --surface2: #141416;
      --border: #1e1e22;
      --border-active: #2e2e36;
      --text: #e8e8ed;
      --muted: #7a7a8a;
      --muted2: #55555f;
      --purple: #7c6af7;
      --purple-dim: #7c6af712;
      --purple-mid: #7c6af730;
      --indigo: #5b52d4;
      --danger: #f87171;
      --success: #34d399;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:20px;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
      pointer-events:none;
      opacity:0.4;
    }

    .glow {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:500px; height:400px;
      background:radial-gradient(ellipse, #7c6af715 0%, transparent 70%);
      pointer-events:none;
      animation:pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} }

    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      padding:40px;
      width:100%;
      max-width:400px;
      position:relative;
      z-index:1;
      animation:fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .wordmark {
      font-family:'Syne',sans-serif;
      font-size:0.8rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:32px;
      display:block;
    }

    h1 {
      font-family:'Syne',sans-serif;
      font-size:1.6rem;
      font-weight:800;
      letter-spacing:-0.02em;
      margin-bottom:8px;
    }
    .subtitle {
      color:var(--muted);
      font-size:0.85rem;
      margin-bottom:32px;
      font-weight:300;
      line-height:1.5;
    }

    /* Google btn */
    .google-btn {
      width:100%;
      padding:13px;
      background:var(--surface2);
      border:1px solid var(--border-active);
      border-radius:10px;
      color:var(--text);
      font-size:0.88rem;
      font-weight:500;
      cursor:pointer;
      transition:all 0.2s;
      font-family:'Inter',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:24px;
    }
    .google-btn:hover { border-color:var(--border-active); background:#1a1a1e; transform:translateY(-1px); }
    .google-icon { width:18px; height:18px; }

    .divider {
      display:flex; align-items:center; gap:12px;
      margin-bottom:24px;
    }
    .divider-line { flex:1; height:1px; background:var(--border); }
    .divider-text { color:var(--muted2); font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; }

    .field { margin-bottom:16px; }
    label {
      display:block;
      font-size:0.68rem;
      text-transform:uppercase;
      letter-spacing:0.1em;
      color:var(--muted);
      font-weight:500;
      margin-bottom:8px;
    }
    input {
      width:100%;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      padding:12px 14px;
      font-size:0.88rem;
      outline:none;
      font-family:'Inter',sans-serif;
      transition:border 0.2s;
    }
    input:focus { border-color:var(--purple-mid); }
    input::placeholder { color:var(--muted2); }

    .submit-btn {
      width:100%;
      padding:14px;
      background:var(--purple);
      border:none;
      border-radius:10px;
      color:#fff;
      font-size:0.88rem;
      font-weight:600;
      cursor:pointer;
      transition:all 0.2s;
      font-family:'Inter',sans-serif;
      letter-spacing:0.03em;
      margin-top:4px;
      position:relative;
      overflow:hidden;
    }
    .submit-btn:hover { background:var(--indigo); transform:translateY(-1px); box-shadow:0 8px 24px #7c6af740; }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

    .toggle {
      text-align:center;
      margin-top:20px;
      font-size:0.82rem;
      color:var(--muted);
    }
    .toggle a {
      color:var(--purple);
      cursor:pointer;
      text-decoration:none;
      font-weight:500;
    }
    .toggle a:hover { color:#a898ff; }

    .message {
      padding:12px 14px;
      border-radius:8px;
      font-size:0.82rem;
      margin-bottom:16px;
      display:none;
      animation:fadeUp 0.3s ease;
    }
    .message.error { background:#f8717110; border:1px solid #f8717130; color:#f87171; }
    .message.success { background:#34d39910; border:1px solid #34d39930; color:#34d399; }

    .loader {
      display:inline-block;
      width:14px; height:14px;
      border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 0.6s linear infinite;
      margin-right:8px;
      vertical-align:middle;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <span class="wordmark">ResumeAI</span>
  <h1 id="cardTitle">Welcome back</h1>
  <p class="subtitle" id="cardSub">Sign in to access your AI resume optimizer.</p>

  <div class="message" id="message"></div>

  <button class="google-btn" onclick="signInGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>

  <!-- Login form -->
  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()"/>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitAuth()">Sign In →</button>
    <div class="toggle">Don't have an account? <a onclick="toggleMode()">Sign up free</a></div>
  </div>

  <!-- Signup form (hidden) -->
  <div id="signupForm" style="display:none">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Stefan Gavra"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailSignup" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordSignup" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')submitAuth()"/>
    </div>
    <button class="submit-btn" id="submitBtnSignup" onclick="submitAuth()">Create Account →</button>
    <div class="toggle">Already have an account? <a onclick="toggleMode()">Sign in</a></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://sdallvtnmcqwqdbsobyx.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_tUx-2z7sl9E7W7C7L-EmTA_-PDESZpq';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let isSignup = false;

  // Check if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/';
  });

  // Handle OAuth redirect
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = '/';
    }
  });

  function toggleMode() {
    isSignup = !isSignup;
    document.getElementById('loginForm').style.display = isSignup ? 'none' : 'block';
    document.getElementById('signupForm').style.display = isSignup ? 'block' : 'none';
    document.getElementById('cardTitle').textContent = isSignup ? 'Create account' : 'Welcome back';
    document.getElementById('cardSub').textContent = isSignup
      ? 'Start optimizing your resume for free.'
      : 'Sign in to access your AI resume optimizer.';
    hideMessage();
  }

  function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
  }
  function hideMessage() {
    document.getElementById('message').style.display = 'none';
  }

  function setLoading(loading) {
    const btn = document.getElementById(isSignup ? 'submitBtnSignup' : 'submitBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="loader"></span>Please wait...'
      : (isSignup ? 'Create Account →' : 'Sign In →');
  }

  async function signInGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' }
    });
    if (error) showMessage(error.message, 'error');
  }

  async function submitAuth() {
    hideMessage();
    if (isSignup) {
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('emailSignup').value.trim();
      const password = document.getElementById('passwordSignup').value;
      if (!name || !email || !password) return showMessage('Please fill in all fields.', 'error');
      if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error');
      setLoading(true);
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      setLoading(false);
      if (error) return showMessage(error.message, 'error');
      showMessage('Account created! Check your email to confirm.', 'success');
    } else {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showMessage('Please enter your email and password.', 'error');
      setLoading(true);
      const { error } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);
      if (error) return showMessage('Invalid email or password.', 'error');
    }
  }
</script>
</body>
</html>
